<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计量选型表单</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="container" id="formContainer">
        <div class="page-header">
            <div>
                <p class="eyebrow">Meter Selector</p>
                <h1>计量选型表单</h1>
            </div>
            <div class="page-actions">
                <button type="button" class="history-btn" id="syncDataBtn">更新数据</button>
                <button type="button" class="history-btn" id="openHistoryBtn">查询历史</button>
            </div>
        </div>
        <div id="messageBar" class="message-bar hidden"></div>
        <form id="measurementForm">
            <div class="form-group">
                <label for="category">类别:</label>
                <select name="category" id="category">
                    <option value="">请选择类别</option>
                </select>
            </div>

            <div class="form-group">
                <label for="sub_category">二级分类:</label>
                <select name="sub_category" id="sub_category">
                    <option value="">请先选择类别</option>
                </select>
            </div>

            <div class="form-group">
                <label for="equipment_name">设备名称:</label>
                <select name="equipment_name" id="equipment_name">
                    <option value="">请先选择二级分类</option>
                </select>
            </div>

            <div class="form-group">
                <label for="model">型号:</label>
                <select name="model" id="model">
                    <option value="">请先选择设备名称</option>
                </select>
            </div>

            <div class="form-group">
                <label for="measurement_requirement">测量对象要求范围:</label>
                <input type="text" name="measurement_requirement" id="measurement_requirement" placeholder="例如：(5.4-5.7)mm，可留空做条件查询">
                <div class="form-hint">可选填。填写后会执行量程覆盖和 MPE 计算；留空时仅按类别、名称、型号、厂家、关键字等条件查询。</div>
            </div>

            <div class="form-group">
                <label for="manufacturer">厂家:</label>
                <select name="manufacturer" id="manufacturer">
                    <option value="">请先选择型号</option>
                </select>
            </div>

            <div class="form-group">
                <label for="keyword">关键字:</label>
                <input type="text" name="keyword" id="keyword" placeholder="选填，可搜索应用场景、型号、厂家等">
            </div>

            <button type="submit" class="submit-btn">提交</button>
        </form>
    </div>

    <div class="container result-container" id="resultContainer">
        <h1>选型结果</h1>
        <div id="resultsList"></div>
        <div class="action-buttons">
            <button type="button" class="history-btn secondary" id="openHistoryBtnResult">查询历史</button>
            <button class="back-btn" onclick="backToForm()">重新选择</button>
        </div>
    </div>

    <div class="history-modal hidden" id="historyModal">
        <div class="history-backdrop" id="historyBackdrop"></div>
        <div class="history-panel" role="dialog" aria-modal="true" aria-labelledby="historyTitle">
            <div class="history-panel-header">
                <div>
                    <p class="eyebrow">Recent Searches</p>
                    <h2 id="historyTitle">查询历史</h2>
                </div>
                <button type="button" class="history-close-btn" id="closeHistoryBtn">关闭</button>
            </div>
            <div class="history-panel-body" id="historyList">
                <p class="history-empty">暂无查询历史。</p>
            </div>
        </div>
    </div>

    <script src="./app.js"></script>
</body>
</html>
